<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassPoll — Dashboard</title>
  <script src="/nav.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; padding: 28px 16px; color: #1e293b; }
    .container { max-width: 720px; margin: 0 auto; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .top-bar h1 { font-size: 1.5rem; color: #4f46e5; font-weight: 800; }
    .btn-new { background: #4f46e5; color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-decoration: none; }
    .btn-new:hover { background: #4338ca; }
    .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); margin-bottom: 18px; }

    /* Login */
    #s-login label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    #s-login input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; outline: none; margin-bottom: 14px; }
    #s-login input:focus { border-color: #4f46e5; }
    .btn-primary { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 9px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { background: #4338ca; }
    .err { color: #ef4444; font-size: 0.85rem; margin-top: 8px; text-align: center; }

    /* Section headings */
    .section-head { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; margin-bottom: 10px; padding-left: 2px; }

    /* Poll rows */
    .poll-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 10px; background: white; transition: border-color 0.12s; }
    .poll-row:hover { border-color: #c7d2fe; }
    .poll-info { flex: 1; min-width: 0; }
    .poll-q { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .poll-meta { font-size: 0.78rem; color: #94a3b8; margin-top: 3px; }
    .badge { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .badge.draft  { background: #fef9c3; color: #854d0e; }
    .badge.active { background: #dcfce7; color: #166534; }
    .badge.closed { background: #f1f5f9; color: #64748b; }
    .btn-action { font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn-action.go   { background: #eef2ff; color: #4f46e5; }
    .btn-action.go:hover   { background: #e0e7ff; }

    .empty { text-align: center; color: #94a3b8; padding: 32px; font-size: 0.9rem; }
    .loading { text-align: center; color: #94a3b8; padding: 40px; }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 style="font-size:1.1rem;font-weight:700;color:#1e293b;">All Polls</h1>
  </div>

  <!-- Login -->
  <div class="card" id="s-login">
    <h2 style="margin-bottom:20px;font-size:1.1rem;">Dashboard Login</h2>
    <label for="pw">Admin Password</label>
    <input type="password" id="pw" placeholder="Enter your admin password" autocomplete="current-password">
    <button class="btn-primary" id="login-btn">View All Polls</button>
    <p class="err" id="login-err"></p>
  </div>

  <!-- Dashboard -->
  <div id="s-dash" style="display:none">
    <div id="section-draft"></div>
    <div id="section-active"></div>
    <div id="section-closed"></div>
  </div>
</div>

<script>
  let savedPassword = sessionStorage.getItem('cp_pw') || '';
  if (savedPassword) tryLoad(savedPassword);

  document.getElementById('login-btn').onclick = () => {
    const pw = document.getElementById('pw').value;
    tryLoad(pw);
  };
  document.getElementById('pw').onkeydown = e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); };

  async function tryLoad(pw) {
    document.getElementById('login-err').textContent = '';
    try {
      const res = await fetch(`/api/dashboard?password=${encodeURIComponent(pw)}`);
      if (!res.ok) { document.getElementById('login-err').textContent = 'Incorrect password.'; return; }
      const polls = await res.json();
      sessionStorage.setItem('cp_pw', pw);
      document.getElementById('s-login').style.display = 'none';
      document.getElementById('s-dash').style.display = 'block';
      render(polls);
    } catch {
      document.getElementById('login-err').textContent = 'Could not connect. Please refresh.';
    }
  }

  function render(polls) {
    const draft  = polls.filter(p => p.status === 'draft');
    const active = polls.filter(p => p.status === 'active');
    const closed = polls.filter(p => p.status === 'closed');

    if (polls.length === 0) {
      document.getElementById('s-dash').innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:#94a3b8;">
          <div style="font-size:2.5rem;margin-bottom:16px;">📋</div>
          <div style="font-size:1rem;font-weight:600;color:#475569;margin-bottom:8px;">No polls yet</div>
          <div style="font-size:0.875rem;margin-bottom:24px;">Create your first poll to get started.</div>
          <a href="/" style="background:#4f46e5;color:white;padding:10px 22px;border-radius:8px;text-decoration:none;font-weight:700;font-size:0.9rem;">+ New Poll</a>
        </div>`;
      return;
    }

    renderSection('section-draft',  'Drafts',   draft,  'draft');
    renderSection('section-active', 'Live Now', active, 'active');
    renderSection('section-closed', 'Closed',   closed, 'closed');
  }

  function renderSection(containerId, title, polls, status) {
    const el = document.getElementById(containerId);
    if (polls.length === 0) { el.innerHTML = ''; return; }

    const rows = polls.map(p => {
      const date = new Date(p.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      const meta = `${p.response_count} response${p.response_count !== 1 ? 's' : ''} · Created ${date} · ${p.duration_minutes} min`;
      return `<div class="poll-row">
        <div class="poll-info">
          <div class="poll-q">${p.question}</div>
          <div class="poll-meta">${meta}</div>
        </div>
        <span class="badge ${status}">${status === 'active' ? 'Live' : status.charAt(0).toUpperCase() + status.slice(1)}</span>
        <a href="/admin/${p.admin_token}" class="btn-action go">Open →</a>
      </div>`;
    }).join('');

    el.innerHTML = `<div class="section-head">${title}</div>${rows}<div style="margin-bottom:20px"></div>`;
  }
</script>
</body>
</html>
